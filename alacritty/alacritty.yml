env:
  TERM: xterm-256color
live_config_reload: true

scrolling:
    history: 10000
    multiplier: 10

selection:
    semantic_escape_chars: '|:"'' {}()[]<>'
    save_to_clipboard: true

window:
  padding:
    x: 10
    y: 5

font:
  normal:
    family: "Monaco"
    style: Regular

  size: 13

  offset:
    x: 0
    y: 6

  1lyph_offset:
    x: 0
    y: 6
color_schemes:
  dark: &dark
    cursor:
      text: '0x1c1c1c'
      cursor: '0xF1F1F1'
    primary:
      background: '0x1c1c1c'
      foreground: '0xe5e1d8'
    normal:
      black:   '0x000000'
      red:     '0xf7786d'
      green:   '0xbde97c'
      yellow:  '0xefdfac'
      blue:    '0x6ebaf8'
      magenta: '0xef88ff'
      cyan:    '0x90fdf8'
      white:   '0xf5f5f5'
    bright:
      black:   '0xb4b4b4'
      red:     '0xf99f92'
      green:   '0xe3f7a1'
      yellow:  '0xf2e9bf'
      blue:    '0xb3d2ff'
      magenta: '0xe5bdff'
      cyan:    '0xc2fefa'
      white:   '0xffffff'
  light: &light
    cursor:
      text: '0xFFFFFF'
      cursor: '0xa1a1a1'
    # Papercolor modified
    primary:
      background: '0xFFFFFF'
      foreground: '0x4D4D4C'

    # Normal colors
    normal:
      black:   '0x444444'
      red:     '0x9e0047'
      green:   '0x718C00'
      yellow:  '0xb25000'
      blue:    '0x4271AE'
      magenta: '0x8959A8'
      cyan:    '0x3E999F'
      white:   '0xf5f5f5'

    # Bright colors
    bright:
      black:   '0x969694'
      red:     '0xff0072'
      green:   '0x8eb200'
      yellow:  '0xff7200'
      blue:    '0x5ea2f9'
      magenta: '0xa56ccc'
      cyan:    '0x51c8d1'
      white:   '0xffffff'

colors: *dark

cursor:
  style: Block
  unfocused_hollow: true

mouse:
  hide_when_typing: true

key_bindings:
  - { key: N,      mods: Command,         action: SpawnNewInstance }
  - { key: Q,      mods: Command,         action: Quit             }
  - { key: W,      mods: Command,         action: Quit             }
  - { key: F,      mods: Command|Control, action: ToggleFullscreen }
  - { key: 36,     mods: Command,         action: ToggleFullscreen }
  - { key: Space,     mods: Alt,          chars: " "                     }
  - { key: Back, mods: Super, chars: "\x15" } 
  - { key: Left,     mods: Alt,     chars: "\x1bb"                       } 
  - { key: Right,    mods: Alt,     chars: "\x1bf"                       }
  - { key: Left,     mods: Command, chars: "\x1bOH",   mode: AppCursor   }
  - { key: Right,    mods: Command, chars: "\x1bOF",   mode: AppCursor   }
  - { key: 10,        mods: Alt,    chars: "\x5c" }
  - { key: 18,        mods: Alt,    chars: "\x7c" }
  - { key: Key2,      mods: Alt,    chars: "@" } 
  - { key: Key3,      mods: Alt,    chars: "#" }
  - { key: Key6,      mods: Alt,    chars: "¬" }
  - { key: 39,        mods: Alt,    chars: "{" }
  - { key: 42,        mods: Alt,    chars: "}" }
  - { key: 33,        mods: Alt,    chars: "[" }
  - { key: 30,        mods: Alt,    chars: "]" }
